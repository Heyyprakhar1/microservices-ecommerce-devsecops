server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Handle React Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to backend services
    # NOTE: Added trailing slash to strip /api/auth/ prefix
    location /api/auth/ {
        proxy_pass http://auth-svc:5001/;  # ← Added trailing slash here
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # IMPORTANT: Handle redirects from backend (Google OAuth callback)
        proxy_redirect http://auth-svc:5001/ /api/auth/;
    }

    location /api/products/ {
        proxy_pass http://prod-svc:5002/;
        proxy_set_header Host $host;
    }

    location /api/orders/ {
        proxy_pass http://order-svc:5003/;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    # Cache static assets
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

