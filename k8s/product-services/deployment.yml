kind: Deployment
apiVersion: apps/v1

metadata:
  name: prod-deploy
  namespace: online-shop-ns

spec:
  replicas: 1
  selector:
    matchLabels:
      app: prod

  template:
    metadata:
      labels:
        app: prod

    spec:
      containers:
        - name: prod
          image: heyyprakhar1/e-commerce-site-project-product-service:latest
          ports: 
            - containerPort: 5002
          env:
            - name: DATABASE_URL
              value: "mysql+pymysql://user:password@mysql-svc.online-shop-ns.svc.cluster.local:3306/authdb"
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: prod-secrets
                  key: JWT_SECRET_KEY
