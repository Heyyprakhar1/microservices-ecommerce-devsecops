kind: Deployment
apiVersion: apps/v1
metadata:
  name: auth-deploy
  namespace: online-shop-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z mysql-svc 3306; do echo "waiting for mysql..."; sleep 2; done']
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
      containers:
        - name: auth
          image: heyyprakhar1/e-commerce-site-project-auth-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5001
          env:
            - name: DATABASE_URL
              value: "mysql+pymysql://user:password@mysql-svc.online-shop-ns.svc.cluster.local:3306/authdb"
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: auth-secrets
                  key: JWT_SECRET_KEY
            - name: GOOGLE_REDIRECT_URI
              value: "http://localhost:8081/api/auth/google/callback"
          livenessProbe:
            httpGet:
              path: /api/auth/health
              port: 5001
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/auth/health
              port: 5001
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
