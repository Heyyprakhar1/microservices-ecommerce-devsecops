kind: Deployment
apiVersion: apps/v1
metadata:
  name: auth-deploy
  namespace: online-shop-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      containers:
        - name: auth
          image: heyyprakhar1/e-commerce-site-project-auth-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5001
          env:
            - name: DATABASE_URL
              value: "mysql+pymysql://user:password@mysql-svc.online-shop-ns.svc.cluster.local:3306/authdb"
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: auth-secrets
                  key: JWT_SECRET_KEY
            - name: GOOGLE_REDIRECT_URI
              value: "http://<your-server-ip>:5001/api/auth/google/callback"
