name: secret-scan
on: workflow_call

jobs:
    secret-scan:
        runs-on: ubuntu-latest
        steps:
            - name: code checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Run gitleak scanner
              uses: gitleaks/gitleaks-action@v2.3.9
              env:
                  GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
