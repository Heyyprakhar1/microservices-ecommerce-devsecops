services:
  mysql:
    container_name: mysql-db
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_USER: user
      MYSQL_DATABASE: authdb
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      retries: 5
      timeout: 5s
      interval: 10s
    
  auth-service:
    image: ${DOCKER_USER}/e-commerce-site-project-auth-service:${DOCKER_TAG:-latest}
    container_name: auth-service
    environment:
      DATABASE_URL: mysql+pymysql://user:password@mysql:3306/authdb
      JWT_SECRET_KEY: super-secret-change-in-prod
    restart: always
    depends_on:
       mysql:
        condition: service_healthy
    ports:
       - "5001:5001"

  product-service:
    image: ${DOCKER_USER}/e-commerce-site-project-prod-service:${DOCKER_TAG:-latest}
    container_name: prod-service
    environment:
        DATABASE_URL: mysql+pymysql://user:password@mysql:3306/authdb
        JWT_SECRET_KEY: super-secret-change-in-prod
    restart: always
    depends_on:
        mysql:
         condition: service_healthy
    ports:
        - "5002:5002"

  order-service:
    image: ${DOCKER_USER}/e-commerce-site-project-order-service:${DOCKER_TAG:-latest}
    container_name: order-service
    environment:
      DATABASE_URL: mysql+pymysql://user:password@mysql:3306/authdb
      JWT_SECRET_KEY: super-secret-change-in-prod
    restart: always
    depends_on: 
      mysql:
        condition: service_healthy
    ports:
      - "5003:5003"

volumes:
  mysql_data:
